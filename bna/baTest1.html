<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank you, twentytwenty!</title>
  <link href="css/foundation.css" rel="stylesheet" type="text/css" />
  <link href="css/twentytwenty.css" rel="stylesheet" type="text/css" />
    <script src="http://ajax.googleapis.com/ajax/libs/jquery/1.10.1/jquery.min.js"></script>
<script>            
	$(function()	{
		$('#clickme').click(function(){ 
			//alert('Im going to start processing');
			$.ajax({            
				url: "../cgi-bin/ba2.py",            
				type: "POST",            
				data: {foo: 'SouthQuad_BA__0000_before.jpg', bar: 'SouthQuad_BA__0002_After.jpg'},            
				success: function(response){
					$("#ba").html(response);                
					$(".twentytwenty-container").twentytwenty({default_offset_pct: 0.5});
					window.location.reload(false);
				}       
			});                
		});            
	});        
</script>    
</head>
  <body>
        <div id="ba" class="twentytwenty-container">
          <img id="before" src="ESPN__0000_exg.jpg" />
          <img id="after" src="ESPN__0001_longTerm.jpg" />
        </div>
		<div class="button1">
			<button id="clickme"> click me </button>
		</div>
		<div id="div">Default Stuff</div>
    <script src="js/jquery.event.move.js"></script>
    <script src="js/jquery.twentytwenty.js"></script>
    <script>
    $(window).load(function(){
      $(".twentytwenty-container").twentytwenty({default_offset_pct: 0.5});  
    });
    </script>
  </body>
</html>
