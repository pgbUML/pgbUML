<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>...</title>
    <style>
        /* Essential Minimalism */
        body {
            margin: 0;
            background-color: #ffffff; /* Clean white background */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Futura is the star here */
            font-family: "Futura-Bold", "Futura", "Trebuchet MS", sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .grid-container {
            width: 90%;
            display: grid;
            /* 6x4 Grid */
            grid-template-columns: repeat(6, 1fr);
            gap: 15px;
            padding: 20px;
        }

        .icon-box {
            aspect-ratio: 1 / 1;
            background-color: #000000; /* Black boxes for high contrast */
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            transition: opacity 0.2s ease; /* Subtle fade instead of a movement */
        }

        /* Minimalist hover: just a slight transparency change */
        .icon-box:hover {
            opacity: 0.8;
        }

        .icon-text {
            color: #ffffff;
            font-size: clamp(1.5rem, 5vw, 3rem); /* Scales based on screen size */
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Responsive Breakpoints */
        @media (max-width: 1024px) {
            .grid-container { grid-template-columns: repeat(4, 1fr); }
        }

        @media (max-width: 768px) {
            .grid-container { grid-template-columns: repeat(3, 1fr); }
        }

        @media (max-width: 480px) {
            .grid-container { 
                grid-template-columns: repeat(2, 1fr);
                width: 95%; 
                gap: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="grid-container">
        <a href="secret-santa/" class="icon-box">
            <span class="icon-text">1</span>
        </a>

        <a href="Enrollment/" class="icon-box">

        </a>

        <a href="double-acrostic/" class="icon-box"><span class="icon-text">3</span></a>

        <a href="sub6/" class="icon-box"><span class="icon-text">6</span></a>
        <a href="sub7/" class="icon-box"><span class="icon-text">7</span></a>
        <a href="sub8/" class="icon-box"><span class="icon-text">8</span></a>
        <a href="sub9/" class="icon-box"><span class="icon-text">9</span></a>
        <a href="sub10/" class="icon-box"><span class="icon-text">10</span></a>
        <a href="sub11/" class="icon-box"><span class="icon-text">11</span></a>

        <a href="sub13/" class="icon-box"><span class="icon-text">13</span></a>

</body>
</html>
