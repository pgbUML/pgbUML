<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wheel O' Fun</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }

        #container {
            display: flex;
            gap: 50px;
            align-items: center;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        #wheel-container {
            position: relative;
            width: 400px;
            height: 400px;
        }

        #wheel-svg {
            width: 100%;
            height: 100%;
            /* Smooth deceleration */
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
        }

        /* Pointer at the TOP (12 o'clock) */
        #pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; 
            height: 0; 
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #e74c3c;
            z-index: 10;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.2));
        }

        #controls { text-align: center; width: 250px; }
        #display-text {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
            min-height: 3.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button {
            padding: 12px 30px;
            font-size: 1.1rem;
            cursor: pointer;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 50px;
            box-shadow: 0 4px 0 #2980b9;
        }

        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #2980b9; }
        button:disabled { background-color: #bdc3c7; box-shadow: none; }
    </style>
</head>
<body>

<div id="container">
    <div id="wheel-container">
        <div id="pointer"></div>
        <svg id="wheel-svg" viewBox="0 0 100 100"></svg>
    </div>

    <div id="controls">
        <div id="display-text">Spin the wheel!</div>
        <button id="spin-button">SPIN</button>
    </div>
</div>

<script>
    const items = [
        "KS p61 top left", "JOS p37", "KS p145 tig", "KS p146 bird", "KS p87 top swing", 
        "KS p143 bottom right", "p91 JOS", "p100 JOS", "p169 JOS", "KS p138", 
        "KS p123", "Barbuda Cocktail Redux", "Tiger Plus One", "Punjab Complete"
    ];

    const wheel = document.getElementById('wheel-svg');
    const btn = document.getElementById('spin-button');
    const display = document.getElementById('display-text');
    
    const numSegments = items.length;
    const degPerSeg = 360 / numSegments;
    let totalRotation = 0;

    function createWheel() {
        for (let i = 0; i < numSegments; i++) {
            // We subtract 90 to start at the top (12 o'clock)
            // We subtract (degPerSeg/2) so the pointer points to the center of the first segment
            const startAngle = (i * degPerSeg) - 90 - (degPerSeg / 2);
            const endAngle = ((i + 1) * degPerSeg) - 90 - (degPerSeg / 2);
            
            const x1 = 50 + 50 * Math.cos(Math.PI * startAngle / 180);
            const y1 = 50 + 50 * Math.sin(Math.PI * startAngle / 180);
            const x2 = 50 + 50 * Math.cos(Math.PI * endAngle / 180);
            const y2 = 50 + 50 * Math.sin(Math.PI * endAngle / 180);
            
            const pathData = `M 50 50 L ${x1} ${y1} A 50 50 0 0 1 ${x2} ${y2} Z`;
            
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", pathData);
            path.setAttribute("fill", i % 2 === 0 ? '#f1c40f' : '#e67e22'); // Alternating colors
            path.setAttribute("stroke", "white");
            path.setAttribute("stroke-width", "0.5");
            wheel.appendChild(path);

            // Labeling numbers
            const textAngle = startAngle + (degPerSeg / 2);
            const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
            const radius = 38;
            const tx = 50 + radius * Math.cos(Math.PI * textAngle / 180);
            const ty = 50 + radius * Math.sin(Math.PI * textAngle / 180);
            
            text.setAttribute("x", tx);
            text.setAttribute("y", ty);
            text.setAttribute("fill", "#333");
            text.setAttribute("font-size", "4");
            text.setAttribute("font-weight", "bold");
            text.setAttribute("text-anchor", "middle");
            text.setAttribute("alignment-baseline", "middle");
            text.setAttribute("transform", `rotate(${textAngle + 90}, ${tx}, ${ty})`);
            text.textContent = i + 1;
            wheel.appendChild(text);
        }
    }

    function spinWheel() {
        btn.disabled = true;
        display.textContent = "Good luck...";

        // Pick a random index
        const randomIndex = Math.floor(Math.random() * numSegments);
        
        // Logic: 
        // 1. Calculate how many degrees to rotate to get the chosen index to the top.
        // 2. Since the wheel starts at 0, and we want "Index 0" to be at the top,
        //    the rotation needed is -(randomIndex * degPerSeg).
        // 3. Add 5-10 full spins for visual effect.
        const extraSpins = (Math.floor(Math.random() * 5) + 5) * 360;
        
        // We accumulate the rotation so the wheel doesn't snap back to 0 before spinning
        const newRotation = extraSpins + (randomIndex * degPerSeg);
        totalRotation -= newRotation; // Subtract because we rotate clockwise to "go back" through the indices
        
        wheel.style.transform = `rotate(${totalRotation}deg)`;

        setTimeout(() => {
            btn.disabled = false;
            
            // To find the winning index from the rotation:
            // Normalize the rotation and see which segment ended up at the 12 o'clock position.
            const normalizedRotation = Math.abs(totalRotation) % 360;
            const winningIndex = Math.round(normalizedRotation / degPerSeg) % numSegments;
            
            display.textContent = items[winningIndex];
        }, 4000);
    }

    btn.addEventListener('click', spinWheel);
    createWheel();
</script>

</body>
</html>
